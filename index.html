<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naveen AI — General Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
      --border: #2a2a35; --accent: #e8c87a; --accent2: #a78bfa;
      --text: #e8e8f0; --text-dim: #7a7a9a;
      --user-bubble: #1e1e30; --ai-bubble: #13131a; --radius: 16px;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(167,139,250,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 50% at 80% 80%, rgba(232,200,122,0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: rgba(13,13,15,0.9); backdrop-filter: blur(12px); flex-shrink: 0;
    }
    .logo { display: flex; align-items: baseline; gap: 6px; }
    .logo-name { font-family: var(--font-display); font-size: 1.3rem; color: var(--accent); letter-spacing: -0.02em; }
    .logo-tag { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }

    .header-center {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 5px 12px;
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim);
      cursor: pointer; transition: all 0.2s;
    }
    .header-center:hover { border-color: var(--accent2); color: var(--text); }
    .header-center .provider-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
    .header-center .provider-name { color: var(--text); font-weight: 500; }
    .header-center .chevron { font-size: 0.6rem; color: var(--text-dim); }

    .header-right { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .btn-sm {
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
      padding: 5px 11px; border-radius: 8px; font-family: var(--font-mono);
      font-size: 0.66rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.2s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Settings Panel ── */
    #settings-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      animation: fadeIn 0.15s ease-out;
    }
    #settings-overlay.open { display: flex; align-items: flex-start; justify-content: flex-end; }
    #settings-panel {
      width: 320px; height: 100vh; background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      animation: slideIn 0.2s ease-out;
      overflow-y: auto;
    }
    @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .settings-title { font-family: var(--font-display); font-size: 1.1rem; color: var(--accent); }
    .btn-close {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.2s;
    }
    .btn-close:hover { border-color: var(--accent); color: var(--accent); }

    .settings-section { padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .settings-section-title {
      font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-dim);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
    }

    .provider-card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      cursor: pointer; transition: all 0.2s; margin-bottom: 8px; width: 100%;
      text-align: left;
    }
    .provider-card:hover { border-color: var(--accent2); background: rgba(167,139,250,0.05); }
    .provider-card.selected { border-color: var(--accent2); background: rgba(167,139,250,0.1); }
    .provider-card .pc-icon { font-size: 1.1rem; flex-shrink: 0; }
    .provider-card .pc-info { flex: 1; }
    .provider-card .pc-name { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text); font-weight: 500; }
    .provider-card .pc-model { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-dim); margin-top: 2px; }
    .provider-card .pc-badge { font-size: 0.54rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }
    .badge-free { background: rgba(74,222,128,0.15); color: #4ade80; }
    .badge-paid { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .pc-check { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
    .provider-card.selected .pc-check { border-color: var(--accent2); background: var(--accent2); color: white; }

    .key-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .key-status { font-family: var(--font-mono); font-size: 0.68rem; margin-top: 6px; }
    .key-status.set { color: #4ade80; }
    .key-status.unset { color: #f87171; }
    .settings-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 10px; border-radius: 8px;
      font-family: var(--font-mono); font-size: 0.72rem; outline: none; transition: border-color 0.2s;
    }
    .settings-input:focus { border-color: var(--accent2); }
    .btn-save-sm {
      background: var(--accent2); border: none; color: #fff;
      padding: 7px 12px; border-radius: 8px; font-family: var(--font-mono);
      font-size: 0.68rem; cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-reset-sm {
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
      padding: 7px 10px; border-radius: 8px; font-family: var(--font-mono);
      font-size: 0.68rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .get-key-link { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent); text-decoration: none; display: inline-block; margin-top: 6px; }

    /* ── Messages ── */
    #messages { position: relative; z-index: 1; flex: 1; overflow-y: auto; padding: 28px 0; scroll-behavior: smooth; }
    .msg-row { display: flex; padding: 6px 24px; gap: 14px; animation: slideUp 0.25s ease-out both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { justify-content: flex-end; }
    .avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-family: var(--font-mono); flex-shrink: 0; margin-top: 2px; }
    .avatar.ai-avatar { background: linear-gradient(135deg, var(--accent2), #818cf8); color: white; }
    .avatar.user-avatar { background: linear-gradient(135deg, var(--accent), #f59e0b); color: #000; font-weight: 600; }
    .bubble { max-width: min(520px, 75vw); padding: 12px 16px; border-radius: var(--radius); font-size: 0.92rem; line-height: 1.65; word-break: break-word; }
    .bubble.user { background: var(--user-bubble); border: 1px solid rgba(167,139,250,0.18); border-bottom-right-radius: 4px; }
    .bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    
    /* ── Input ── */
    #input-area { padding: 14px 20px 18px; border-top: 1px solid var(--border); background: rgba(13,13,15,0.9); backdrop-filter: blur(12px); flex-shrink: 0; }
    .input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; }
    #user-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 0.92rem; resize: none; max-height: 140px; }
    #send-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; }
    
    .typing-indicator { display: flex; gap: 5px; padding: 4px 0; }
    .typing-indicator span { width: 7px; height: 7px; background: var(--text-dim); border-radius: 50%; animation: bounce 1.2s infinite; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
    .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; padding: 10px 14px; border-radius: 10px; font-size: 0.82rem; margin: 4px 24px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">✦ Naveen AI</span>
    <span class="logo-tag">Assistant</span>
  </div>
  <div class="header-center" onclick="openSettings()">
    <div class="provider-dot"></div>
    <span id="header-provider-name" class="provider-name">Claude</span>
    <span class="chevron">⚙</span>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <button class="btn-sm" onclick="clearChat()">CLEAR</button>
    <button class="btn-icon" onclick="openSettings()">⚙</button>
  </div>
</header>

<div id="messages">
  <div id="welcome" style="text-align:center; padding: 50px;">
    <h2 style="color:var(--accent); font-family:var(--font-display); font-size: 2rem;">Good to see you, Naveen.</h2>
    <p style="color:var(--text-dim); margin-top:10px;">Select a provider and add your API key to get started.</p>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Ask me anything…" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<div id="settings-overlay" onclick="overlayClick(event)">
  <div id="settings-panel">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="btn-close" onclick="closeSettings()">✕</button>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">Choose Provider</div>
      <button class="provider-card selected" data-provider="claude" onclick="selectProvider('claude')">
        <span class="pc-icon">🤖</span>
        <div class="pc-info"><div class="pc-name">Claude</div><div class="pc-model">claude-3-5-sonnet</div></div>
        <span class="pc-badge badge-paid">PAID</span>
        <div class="pc-check">✓</div>
      </button>
      <button class="provider-card" data-provider="gemini" onclick="selectProvider('gemini')">
        <span class="pc-icon">✨</span>
        <div class="pc-info"><div class="pc-name">Gemini</div><div class="pc-model">gemini-2.0-flash</div></div>
        <span class="pc-badge badge-free">FREE</span>
        <div class="pc-check"></div>
      </button>
      <button class="provider-card" data-provider="groq" onclick="selectProvider('groq')">
        <span class="pc-icon">⚡</span>
        <div class="pc-info"><div class="pc-name">Groq</div><div class="pc-model">llama-3.1-8b-instant</div></div>
        <span class="pc-badge badge-free">FREE</span>
        <div class="pc-check"></div>
      </button>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">API Key — <span id="key-section-provider">Claude</span></div>
      <div id="key-status-row" class="key-status unset">⚠ No key saved</div>
      <div class="key-row">
        <input type="password" class="settings-input" id="settings-key-input" placeholder="Paste key…"/>
        <button class="btn-save-sm" onclick="saveSettingsKey()">SAVE</button>
        <button class="btn-reset-sm" onclick="resetSettingsKey()">✕</button>
      </div>
      <a id="settings-key-link" href="#" target="_blank" class="get-key-link">Get key →</a>
    </div>
  </div>
</div>

<script>
  const PROVIDERS = {
    claude: { name:'Claude', model:'claude-3-5-sonnet-20241022', icon:'🤖', storageKey:'naveen_key_claude', keyLink:'https://console.anthropic.com/' },
    gemini: { name:'Gemini', model:'gemini-2.0-flash', icon:'✨', storageKey:'naveen_key_gemini', keyLink:'https://aistudio.google.com/app/apikey' },
    groq:   { name:'Groq',   model:'llama-3.1-8b-instant', icon:'⚡', storageKey:'naveen_key_groq', keyLink:'https://console.groq.com/keys' }
  };

  let currentProvider = 'claude';
  let history = [];
  let isStreaming = false;

  const getKey = p => localStorage.getItem(PROVIDERS[p].storageKey) || '';

  function openSettings() { document.getElementById('settings-overlay').classList.add('open'); refreshKeySection(); }
  function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }
  function overlayClick(e) { if (e.target.id === 'settings-overlay') closeSettings(); }

  function selectProvider(p) {
    currentProvider = p;
    document.querySelectorAll('.provider-card').forEach(c => {
      const isSel = c.dataset.provider === p;
      c.classList.toggle('selected', isSel);
      c.querySelector('.pc-check').textContent = isSel ? '✓' : '';
    });
    document.getElementById('header-provider-name').textContent = PROVIDERS[p].icon + ' ' + PROVIDERS[p].name;
    refreshKeySection();
  }

  function refreshKeySection() {
    const cfg = PROVIDERS[currentProvider];
    const key = getKey(currentProvider);
    document.getElementById('key-section-provider').textContent = cfg.name;
    document.getElementById('settings-key-input').value = key ? '••••••••' : '';
    const status = document.getElementById('key-status-row');
    status.textContent = key ? '✓ Key saved' : '⚠ No key saved';
    status.className = 'key-status ' + (key ? 'set' : 'unset');
    document.getElementById('settings-key-link').href = cfg.keyLink;
  }

  function saveSettingsKey() {
    const val = document.getElementById('settings-key-input').value;
    if (val && !val.includes('•')) {
      localStorage.setItem(PROVIDERS[currentProvider].storageKey, val);
      refreshKeySection();
    }
  }

  function resetSettingsKey() {
    localStorage.removeItem(PROVIDERS[currentProvider].storageKey);
    refreshKeySection();
  }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  function appendMessage(role, content) {
    document.getElementById('welcome')?.remove();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const icon = role === 'user' ? 'N' : PROVIDERS[currentProvider].icon;
    row.innerHTML = `<div class="avatar ${role}-avatar">${icon}</div><div class="bubble ${role}">${content.replace(/\n/g, '<br>')}</div>`;
    document.getElementById('messages').appendChild(row);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    const key = getKey(currentProvider);
    if (!text || isStreaming) return;
    if (!key) { openSettings(); return; }

    input.value = '';
    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    const typing = document.createElement('div');
    typing.className = 'msg-row ai';
    typing.id = 'typing';
    typing.innerHTML = `<div class="avatar ai-avatar">${PROVIDERS[currentProvider].icon}</div><div class="bubble ai"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    document.getElementById('messages').appendChild(typing);

    try {
      let reply = "";
      if (currentProvider === 'groq') {
        const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: PROVIDERS.groq.model, messages: history })
        });
        const data = await r.json();
        reply = data.choices[0].message.content;
      } else if (currentProvider === 'gemini') {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${PROVIDERS.gemini.model}:generateContent?key=${key}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: history.map(h => ({ role: h.role === 'user' ? 'user' : 'model', parts: [{ text: h.content }] })) })
        });
        const data = await r.json();
        reply = data.candidates[0].content.parts[0].text;
      }
      
      document.getElementById('typing').remove();
      appendMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      document.getElementById('typing').remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.textContent = "Error: " + err.message;
      document.getElementById('messages').appendChild(errDiv);
    }
  }

  function clearChat() {
    history = [];
    document.getElementById('messages').innerHTML = '';
  }
</script>
</body>
</html>
