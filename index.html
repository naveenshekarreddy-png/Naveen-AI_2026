<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naveen AI — Claude Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
      --border: #2a2a35; --accent: #e8c87a; --accent2: #a78bfa;
      --text: #e8e8f0; --text-dim: #7a7a9a;
      --user-bubble: #1e1e30; --ai-bubble: #13131a; --radius: 16px;
      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(167,139,250,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 50% at 80% 80%, rgba(232,200,122,0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: rgba(13,13,15,0.9); backdrop-filter: blur(12px); flex-shrink: 0;
    }
    .logo { display: flex; align-items: baseline; gap: 6px; }
    .logo-name { font-family: var(--font-display); font-size: 1.3rem; color: var(--accent); letter-spacing: -0.02em; }
    
    .header-right { display: flex; align-items: center; gap: 8px; }
    .btn-sm {
      background: transparent; border: 1px solid var(--border); color: var(--text-dim);
      padding: 5px 11px; border-radius: 8px; font-family: var(--font-mono);
      font-size: 0.66rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Settings Panel ── */
    #settings-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    }
    #settings-overlay.open { display: flex; align-items: flex-start; justify-content: flex-end; }
    #settings-panel {
      width: 320px; height: 100vh; background: var(--surface);
      border-left: 1px solid var(--border); display: flex; flex-direction: column;
    }
    .settings-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .settings-section { padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .settings-section-title { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }

    .key-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .settings-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 8px; outline: none; }
    .btn-save-sm { background: var(--accent2); border: none; color: #fff; padding: 7px 12px; border-radius: 8px; cursor: pointer; }

    /* ── Messages ── */
    #messages { position: relative; z-index: 1; flex: 1; overflow-y: auto; padding: 28px 0; }
    .msg-row { display: flex; padding: 6px 24px; gap: 14px; animation: slideUp 0.25s ease-out both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { justify-content: flex-end; }
    .avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); flex-shrink: 0; }
    .avatar.ai-avatar { background: linear-gradient(135deg, var(--accent2), #818cf8); color: white; }
    .avatar.user-avatar { background: linear-gradient(135deg, var(--accent), #f59e0b); color: #000; font-weight: 600; }
    .bubble { max-width: 75%; padding: 12px 16px; border-radius: var(--radius); font-size: 0.92rem; line-height: 1.6; }
    .bubble.user { background: var(--user-bubble); border-bottom-right-radius: 4px; }
    .bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    
    /* ── Input ── */
    #input-area { padding: 14px 20px 18px; border-top: 1px solid var(--border); background: rgba(13,13,15,0.9); }
    .input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; }
    #user-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 0.92rem; resize: none; max-height: 140px; }
    #send-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); border: none; cursor: pointer; color: #000; }
    .error-msg { background: rgba(248,113,113,0.1); border: 1px solid #f871714d; color: #fca5a5; padding: 10px 14px; border-radius: 10px; margin: 10px 24px; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">✦ Naveen AI</span>
  </div>
  <div class="header-right">
    <button class="btn-sm" onclick="clearChat()">CLEAR</button>
    <button class="btn-sm" onclick="openSettings()">SET API KEY</button>
  </div>
</header>

<div id="messages">
  <div id="welcome" style="text-align:center; padding: 50px;">
    <h2 style="color:var(--accent); font-family:var(--font-display); font-size: 2rem;">Claude Assistant</h2>
    <p style="color:var(--text-dim); margin-top:10px;">Enter your Anthropic API key in settings to start chatting.</p>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Ask Claude anything…" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div id="settings-overlay" onclick="overlayClick(event)">
  <div id="settings-panel">
    <div class="settings-header">
      <h3 style="color:var(--accent)">Claude Settings</h3>
      <button class="btn-sm" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Anthropic API Key</div>
      <div class="key-row">
        <input type="password" class="settings-input" id="api-key-input" placeholder="sk-ant-...">
        <button class="btn-save-sm" onclick="saveKey()">SAVE</button>
      </div>
      <p id="key-status" style="font-size:0.7rem; margin-top:8px; color:var(--text-dim)"></p>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'naveen_claude_key';
  const MODEL = 'claude-3-5-sonnet-20241022';
  let history = [];
  let isThinking = false;

  function openSettings() {
    document.getElementById('settings-overlay').classList.add('open');
    const key = localStorage.getItem(STORAGE_KEY);
    document.getElementById('key-status').textContent = key ? "✓ Key is stored locally" : "⚠ No key found";
  }
  function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }
  function overlayClick(e) { if(e.target.id === 'settings-overlay') closeSettings(); }
  
  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if(val) {
      localStorage.setItem(STORAGE_KEY, val);
      document.getElementById('api-key-input').value = '';
      openSettings();
    }
  }

  function handleKey(e) { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  function appendMessage(role, content) {
    document.getElementById('welcome')?.remove();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const icon = role === 'user' ? 'N' : '🤖';
    row.innerHTML = `<div class="avatar ${role}-avatar">${icon}</div><div class="bubble ${role}">${content.replace(/\n/g, '<br>')}</div>`;
    document.getElementById('messages').appendChild(row);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    const key = localStorage.getItem(STORAGE_KEY);

    if(!text || isThinking) return;
    if(!key) { openSettings(); return; }

    input.value = '';
    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    isThinking = true;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 1024,
          messages: history
        })
      });

      const data = await response.json();
      if(data.error) throw new Error(data.error.message);

      const reply = data.content[0].text;
      appendMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      const errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.textContent = "Claude Error: " + err.message;
      document.getElementById('messages').appendChild(errDiv);
    } finally {
      isThinking = false;
    }
  }

  function clearChat() {
    history = [];
    document.getElementById('messages').innerHTML = '';
  }
</script>
</body>
</html>
